# 本地集群开发配置示例（复制为 application-local.yml，已 gitignore）
# 前置：cd docker && docker compose up -d
#
# 启动：mvn -pl apps/server spring-boot:run -Dspring-boot.run.profiles=prod,local,bundle

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fast_knowledge
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgres.sql
  data:
    redis:
      host: localhost
      port: 6379

knowledge:
  storage:
    provider: minio
    minio:
      endpoint: http://localhost:9000
      bucket: fast-knowledge
      access-key: minioadmin
      secret-key: minioadmin
      prefix: knowledge/
  vector:
    provider: pgvector
  cache:
    provider: redis
