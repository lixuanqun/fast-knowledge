server:
  port: 8088

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgres.sql
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

knowledge:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ORIGINS:}
  storage:
    provider: minio
    minio:
      endpoint: ${MINIO_ENDPOINT}
      bucket: ${MINIO_BUCKET}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      region: ${MINIO_REGION:}
      prefix: ${MINIO_PREFIX:knowledge/}
  vector:
    provider: pgvector
  cache:
    provider: ${CACHE_PROVIDER:redis}
  embedding:
    provider: ${EMBEDDING_PROVIDER:onnx}
    onnx-model-path: /data/knowledge/models/bge-small-zh-v1.5.onnx
    onnx-tokenizer-path: /data/knowledge/models/tokenizer.json
  llm:
    provider: ${LLM_PROVIDER:ollama}
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    allow-external: ${LLM_ALLOW_EXTERNAL:true}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
