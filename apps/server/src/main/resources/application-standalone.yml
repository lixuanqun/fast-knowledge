# 单机版：SQLite + sqlite-vec + Caffeine + 本地文件
# 启动：mvn spring-boot:run -Dspring-boot.run.profiles=standalone,bundle

spring:
  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:./data/fast-knowledge.db}?enable_load_extension=true
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      schema-locations: classpath:db/schema-sqlite.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

knowledge:
  storage:
    provider: local
    upload-dir: ./data/uploads
  vector:
    provider: sqlite-vec
    sqlite-vec:
      extension-path: ${SQLITE_VEC_EXTENSION:}
  cache:
    provider: caffeine
