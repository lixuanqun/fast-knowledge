server:
  port: 8088
  servlet:
    context-path: /api

spring:
  profiles:
    default: standalone
  threads:
    virtual:
      enabled: true
  application:
    name: fast-knowledge-server
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
  global-config:
    db-config:
      id-type: auto

knowledge:
  jwt:
    secret: ${JWT_SECRET:fast-knowledge-jwt-secret-change-in-production-32chars}
    expire-seconds: 86400
  embedding:
    provider: ${EMBEDDING_PROVIDER:onnx}
    onnx-model-path: ./data/models/bge-small-zh-v1.5.onnx
    onnx-tokenizer-path: ./data/models/tokenizer.json
    dimension: 512
    onnx-max-seq-len: 512
    onnx-batch-size: 16
    ollama-url: ${OLLAMA_EMBED_URL:http://localhost:11434}
    ollama-model: ${EMBEDDING_MODEL:nomic-embed-text}
  chunk:
    size: 512
    overlap: 50
  search:
    default-top-k: 8
    hybrid-alpha: 0.6
    cache-ttl-minutes: 5
  llm:
    provider: ${LLM_PROVIDER:ollama}
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    max-tokens: 4096
    temperature: 0.3
    allow-external: ${LLM_ALLOW_EXTERNAL:true}
  cors:
    allowed-origins: ${CORS_ORIGINS:*}
  setup:
    instance-name: Fast Knowledge

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
