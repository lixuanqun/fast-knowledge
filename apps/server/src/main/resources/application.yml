server:
  port: 8088
  servlet:
    context-path: /api

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: fast-knowledge-server
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: jdbc:mysql://localhost:3306/fast_knowledge?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
  mapper-locations: classpath:mapper/*.xml

pagehelper:
  helper-dialect: mysql
  reasonable: true

knowledge:
  jwt:
    secret: ${JWT_SECRET:fast-knowledge-jwt-secret-change-in-production-32chars}
    expire-seconds: 86400
  storage:
    provider: ${STORAGE_PROVIDER:local}
    upload-dir: ./data/uploads
  lucene:
    base-path: ./data/lucene
  vector:
    provider: ${VECTOR_PROVIDER:lucene}
    pgvector:
      datasource-url: ${PGVECTOR_URL:jdbc:postgresql://localhost:5432/fast_knowledge}
      username: ${PGVECTOR_USER:postgres}
      password: ${PGVECTOR_PASSWORD:postgres}
    qdrant:
      host: ${QDRANT_HOST:localhost}
      port: ${QDRANT_PORT:6333}
  cache:
    provider: ${CACHE_PROVIDER:caffeine}
  embedding:
    provider: ${EMBEDDING_PROVIDER:onnx}
    onnx-model-path: ./data/models/bge-small-zh-v1.5.onnx
    onnx-tokenizer-path: ./data/models/tokenizer.json
    dimension: 512
    onnx-max-seq-len: 512
    onnx-batch-size: 16
    ollama-url: ${OLLAMA_EMBED_URL:http://localhost:11434}
    ollama-model: ${EMBEDDING_MODEL:nomic-embed-text}
  chunk:
    size: 512
    overlap: 50
  search:
    default-top-k: 8
    hybrid-alpha: 0.6
  llm:
    provider: ${LLM_PROVIDER:ollama}
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    max-tokens: 4096
    temperature: 0.3
    allow-external: ${LLM_ALLOW_EXTERNAL:true}
  cors:
    allowed-origins: ${CORS_ORIGINS:*}
  setup:
    instance-name: Fast Knowledge

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
