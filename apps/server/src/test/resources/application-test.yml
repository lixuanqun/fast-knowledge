spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgres.sql

knowledge:
  cache:
    provider: redis
  embedding:
    provider: hash
  vector:
    provider: pgvector
  storage:
    provider: minio
    minio:
      endpoint: http://localhost:9000
      bucket: fast-knowledge
      access-key: minioadmin
      secret-key: minioadmin
      prefix: knowledge/
  llm:
    provider: ollama
    allow-external: false
