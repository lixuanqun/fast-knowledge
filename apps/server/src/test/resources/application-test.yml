spring:
  datasource:
    url: jdbc:sqlite:file:memdb1?mode=memory&cache=shared&enable_load_extension=true
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-sqlite.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

knowledge:
  cache:
    provider: caffeine
  embedding:
    provider: hash
  vector:
    provider: sqlite-vec
  storage:
    provider: local
    upload-dir: ./target/test-uploads
  llm:
    provider: ollama
    allow-external: true
