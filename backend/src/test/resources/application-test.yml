spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:fast_knowledge;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

knowledge:
  cache:
    provider: caffeine
  embedding:
    provider: hash
  vector:
    provider: lucene
  lucene:
    base-path: ./target/test-lucene
  storage:
    provider: local
    upload-dir: ./target/test-uploads
  llm:
    provider: ollama
    allow-external: true
