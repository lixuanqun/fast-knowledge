# Fast Knowledge — Nginx 反向代理示例
# 将 frontend/dist 部署到 /var/www/fast-knowledge/dist
# 后端 Spring Boot 监听 127.0.0.1:8088
#
# 构建前端时会生成 .gz 预压缩文件，需开启 gzip_static。
# 若使用 npm run build:jar 单 Jar 部署，可忽略本文件。

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

server {
    listen 80;
    server_name knowledge.example.com;

    root /var/www/fast-knowledge/dist;
    index index.html;

    # 安全响应头（可按需调整 CSP）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 带 hash 的静态资源长期缓存
    location /assets/ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri.gz =404;
    }

    # SPA 入口不缓存，确保发版后立即生效
    location = /index.html {
        gzip_static on;
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri $uri.gz =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API（含 SSE 流式：问答、对话、写作）
    location /api/ {
        proxy_pass http://127.0.0.1:8088/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }
}
