# Fast Knowledge 集群全栈部署（应用 + PostgreSQL/pgvector + Redis + MinIO）
# 用法：cd docker && docker compose -f docker-compose.full.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fast-knowledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fast_knowledge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fast_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fast-knowledge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fast-knowledge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/fast-knowledge || true;
      exit 0;
      "

  ollama:
    image: ollama/ollama:latest
    container_name: fast-knowledge-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fast-knowledge-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: bundle
      SQL_INIT_MODE: ${SQL_INIT_MODE:-always}
      DB_URL: jdbc:postgresql://postgres:5432/fast_knowledge
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_PROVIDER: redis
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: fast-knowledge
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PREFIX: knowledge/
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-onnx}
      ONNX_MODEL_PATH: /data/knowledge/models/bge-small-zh-v1.5.onnx
      ONNX_TOKENIZER_PATH: /data/knowledge/models/tokenizer.json
      RERANK_ONNX_MODEL_PATH: /data/knowledge/models/bge-reranker-base.onnx
      RERANK_ONNX_TOKENIZER_PATH: /data/knowledge/models/bge-reranker-tokenizer.json
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:?请设置 LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET}
      VECTOR_PROVIDER: pgvector
    volumes:
      - app_data:/data/knowledge
      - ../data/models:/data/knowledge/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  app_data:
