# Fast Knowledge 本地开发依赖（PostgreSQL/pgvector + Redis + MinIO）
# 用法：cd docker && docker compose up -d
# 启动应用：mvn -pl apps/server spring-boot:run -Dspring-boot.run.profiles=bundle

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fast-knowledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fast_knowledge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fast_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fast-knowledge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fast-knowledge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/fast-knowledge || true;
      exit 0;
      "

  ollama:
    image: ollama/ollama:latest
    container_name: fast-knowledge-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
