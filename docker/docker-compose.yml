# Fast Knowledge 集群本地开发依赖（PostgreSQL/pgvector + Redis）
# 单机 standalone 开发无需 Docker，直接 mvn spring-boot:run 即可
# 用法：cd docker && docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fast-knowledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fast_knowledge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fast_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fast-knowledge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
