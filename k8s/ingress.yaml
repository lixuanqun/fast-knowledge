apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fast-knowledge
  annotations:
    # 按集群 Ingress Controller 调整，例如 nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: knowledge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fast-knowledge
                port:
                  number: 8088
