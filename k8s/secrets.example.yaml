# 示例 Secret — 部署前请替换占位值并应用：
#   kubectl apply -f k8s/secrets.example.yaml
#
# 生产环境建议使用 Sealed Secrets、External Secrets 或云厂商密钥管理，勿将真实密钥提交到 Git。
apiVersion: v1
kind: Secret
metadata:
  name: fast-knowledge-secrets
type: Opaque
stringData:
  db-url: jdbc:postgresql://postgres:5432/fast_knowledge
  db-user: postgres
  db-password: CHANGE_ME_db_password
  minio-access-key: CHANGE_ME_minio_access
  minio-secret-key: CHANGE_ME_minio_secret
  jwt-secret: CHANGE_ME_jwt_secret_at_least_32_characters_long
  llm-base-url: https://api.openai.com/v1
  llm-api-key: CHANGE_ME_llm_api_key
